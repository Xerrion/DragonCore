name: Bug Report
description: Report a bug with DragonCore
title: "[Bug]: "
labels:
  - C-Bug
assignees:
  - Xerrion
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to trigger the bug
      placeholder: |
        1. Load the consuming addon
        2. Call DragonCore API ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens (include errors)
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which DragonCore subsystem is affected?
      options:
        - A-Capabilities
        - A-Subscription
        - A-SecureCall
        - A-Dispatcher
        - A-Schedule
        - A-Listener
        - A-EventBus
        - A-Locale
        - A-AddonChannel
        - A-Store
        - A-Settings
        - A-Lifecycle
        - A-Docs
        - A-CI
    validations:
      required: true
  - type: dropdown
    id: wow-version
    attributes:
      label: WoW Version
      description: Which version of World of Warcraft are you playing?
      options:
        - Retail
        - MoP Classic
        - TBC Anniversary
        - Classic Era
    validations:
      required: true
  - type: input
    id: dragon-core-version
    attributes:
      label: DragonCore Version
      description: 'Version number or "latest"'
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Screenshots, error logs, addon list
    validations:
      required: false