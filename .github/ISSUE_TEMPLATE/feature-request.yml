name: Feature Request
description: Suggest a new feature or improvement for DragonCore
title: "[Feature]: "
labels:
  - C-Feature
assignees:
  - Xerrion
body:
  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the desired feature or API
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which DragonCore subsystem would this affect?
      options:
        - A-Capabilities
        - A-Subscription
        - A-SecureCall
        - A-Dispatcher
        - A-Schedule
        - A-Listener
        - A-EventBus
        - A-Locale
        - A-AddonChannel
        - A-Store
        - A-Settings
        - A-Lifecycle
        - A-Docs
        - A-CI
    validations:
      required: true
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Examples, references, mockups
    validations:
      required: false